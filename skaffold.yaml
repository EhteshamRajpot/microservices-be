apiVersion: skaffold/v2alpha3
kind: Config
deploy:
  kubectl:
    manifests:
      - ./infra/k8s/auth-depl.yaml
      - ./infra/k8s/auth-mongo-depl.yaml
      - ./infra/k8s/nats-depl.yaml
      - ./infra/k8s/tickets-depl.yaml
      - ./infra/k8s/tickets-mongo-depl.yaml
      - ./infra/k8s/client-depl.yaml
      - ./infra/k8s/ingress-srv.yaml
      - ./infra/k8s/orders-depl.yaml
      - ./infra/k8s/orders-mongo-depl.yaml
      - ./infra/k8s/payments-depl.yaml
      - ./infra/k8s/payments-mongo-depl.yaml
build:
  local:
    push: false
  artifacts:
    - image: ehtesham-dev/auth
      context: auth
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .
    - image: ehtesham-dev/client
      context: ../client
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: '**/*.js'
            dest: .
          - src: '**/*.css'
            dest: .
    - image: ehtesham-dev/tickets
      context: .
      docker:
        dockerfile: tickets/Dockerfile
      sync:
        manual:
          # Context is repo root: without strip, files land at /app/tickets/tickets/src/... (wrong).
          - src: 'tickets/src/**/*.ts'
            dest: .
            strip: 'tickets/'
    - image: ehtesham-dev/orders
      context: .
      docker:
        dockerfile: orders/Dockerfile
      sync:
        manual:
          # Without strip: synced TS ends up under /app/orders/orders/src/... while tsx runs /app/orders/src/...
          - src: 'orders/src/**/*.ts'
            dest: .
            strip: 'orders/'
    - image: ehtesham-dev/expiration
      context: expiration
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .
    - image: ehtesham-dev/payments
      context: .
      docker:
        dockerfile: payments/Dockerfile
      sync:
        manual:
          - src: 'payments/src/**/*.ts'
            dest: .
            strip: 'payments/'