apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: ehtesham-dev/client
          imagePullPolicy: IfNotPresent
          env:
            # SSR calls APIs using the same public host the browser used (avoids guessing ingress Service DNS).
            - name: SSR_USE_FORWARDED_ORIGIN
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: client-srv
spec:
  selector:
    app: client
  ports:
    - name: client
      protocol: TCP
      port: 3000
      targetPort: 3000